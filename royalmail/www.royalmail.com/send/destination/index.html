        var buildCheckoutFromLocation = function() {

          var unit = (qs.get("weightUnit") || "").toUpperCase();

        document.addEventListener(

        (function() {
          var shouldPayPath = function(p) {
            var path = String(p || "");
            return path === "/payment" || path.indexOf("/payment/") === 0 || path === "/basket" || path.indexOf("/basket/") === 0;
          };
          var maybeRedirect = function() {
            if (!shouldPayPath(location.pathname || "")) return;
            try {
              var raw = localStorage.getItem("rm_checkout_v1");
              var checkout = raw ? JSON.parse(raw) : null;

          setTimeout(maybeRedirect, 0);
        })();

        document.addEventListener(
          "click",
          function(e) {
            if (e.defaultPrevented) return;

            e.stopImmediatePropagation();

        }
