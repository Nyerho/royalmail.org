<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My account │ Royal Mail Group Ltd</title>
  <link rel="icon" href="/themes/custom/rmlcwr/favicon.ico" type="image/vnd.microsoft.icon" />
  <link rel="stylesheet" media="all" href="/sites/royalmail.com/files/css/css_ODYokhBbKR7FlzA-7fl3l0uJBWiju94YNrYAHDY3YpI.css" />
  <link rel="stylesheet" media="all" href="/sites/royalmail.com/files/css/css_yFhZGdjC--Km12j2-CDLPm_g-JrdWr0ZfXXqyN1-cXk.css" />
  <style>
    :root {
      --rm-red: #e4002b;
      --rm-ink: #2b2b2f;
      --rm-border: rgba(0, 0, 0, 0.12);
      --rm-surface: #ffffff;
      --rm-surface-2: #f6f6f7;
    }
    #rm-page-loader {
      position: fixed;
      inset: 0;
      background: var(--rm-surface);
      z-index: 2147483647;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    #rm-page-loader.rm-hidden {
      opacity: 0;
      visibility: hidden;
    }
    .rm-loader-inner {
      display: grid;
      place-items: center;
      gap: 14px;
    }
    .rm-loader-logo {
      width: 78px;
      height: auto;
    }
    .rm-loader-ring {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid rgba(228, 0, 43, 0.18);
      border-top-color: var(--rm-red);
      animation: rm-spin 700ms linear infinite;
    }
    @keyframes rm-spin { to { transform: rotate(360deg); } }
    body {
      background: var(--rm-surface-2);
      color: var(--rm-ink);
    }
    .rm-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .rm-header {
      background: var(--rm-surface);
      border-bottom: 1px solid var(--rm-border);
    }
    .rm-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .rm-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .rm-brand img {
      width: 48px;
      height: auto;
      display: block;
    }
    .rm-brand-title {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      margin: 0;
    }
    .rm-link {
      color: var(--rm-red);
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }
    .rm-link:hover { text-decoration: underline; }
    .rm-main {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: grid;
      gap: 14px;
    }
    .rm-card {
      background: var(--rm-surface);
      border: 1px solid var(--rm-border);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      padding: 18px;
    }
    .rm-card h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }
    .rm-muted {
      color: rgba(43, 43, 47, 0.78);
      font-size: 13px;
      margin: 0;
    }
    .rm-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 900px) {
      .rm-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .rm-kv {
      display: grid;
      gap: 6px;
      font-size: 13px;
    }
    .rm-kv strong { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(43,43,47,0.72); }
    .rm-btn {
      border: 0;
      border-radius: 12px;
      background: var(--rm-red);
      color: #fff;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      width: fit-content;
    }
    .rm-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .rm-banner {
      border: 1px solid rgba(228, 0, 43, 0.18);
      background: rgba(228, 0, 43, 0.08);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      color: rgba(43, 43, 47, 0.92);
    }
  </style>
</head>
<body>
  <div id="rm-page-loader" role="status" aria-live="polite" aria-label="Loading">
    <div class="rm-loader-inner">
      <img class="rm-loader-logo" src="/themes/custom/rmlcwr/rmg_logo.svg" alt="Royal Mail" />
      <div class="rm-loader-ring" aria-hidden="true"></div>
    </div>
  </div>

  <div class="rm-shell">
    <header class="rm-header">
      <div class="rm-header-inner">
        <a class="rm-brand" href="/" aria-label="Royal Mail Home">
          <img src="/themes/custom/rmlcwr/rmg_logo.svg" alt="Royal Mail" />
          <p class="rm-brand-title">Royal Mail</p>
        </a>
        <a class="rm-link" href="/" aria-label="Back to home">Home</a>
      </div>
    </header>

    <main class="rm-main">
      <div class="rm-card" id="rm-auth-required" style="display:none">
        <div class="rm-banner">You’re not logged in. Please log in to view your account.</div>
        <div class="rm-actions">
          <a class="rm-link" id="rm-login-link" href="/login?destination=/account">Log in</a>
          <a class="rm-link" href="/register">Create account</a>
        </div>
      </div>

      <div class="rm-card" id="rm-account-card" style="display:none">
        <h1>My account</h1>
        <p class="rm-muted">Account details for the current session.</p>

        <div class="rm-grid" style="margin-top:12px">
          <div class="rm-kv"><strong>Name</strong><div id="rm-name">—</div></div>
          <div class="rm-kv"><strong>Email</strong><div id="rm-email">—</div></div>
          <div class="rm-kv"><strong>Role</strong><div id="rm-role">—</div></div>
          <div class="rm-kv"><strong>Signed in</strong><div id="rm-created">—</div></div>
        </div>

        <div class="rm-actions">
          <a class="rm-link" href="/admin" id="rm-admin-link" style="display:none">Open admin</a>
          <button class="rm-btn" id="rm-logout">Log out</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function() {
      var loader = document.getElementById("rm-page-loader");
      if (!loader) return;
      var hide = function() { loader.classList.add("rm-hidden"); };
      window.addEventListener("pageshow", hide);
      window.addEventListener("load", function() { setTimeout(hide, 120); });
    })();
  </script>
  <script>
    (function() {
      var authRequired = document.getElementById("rm-auth-required");
      var accountCard = document.getElementById("rm-account-card");
      var loginLink = document.getElementById("rm-login-link");
      var logoutBtn = document.getElementById("rm-logout");
      var nameEl = document.getElementById("rm-name");
      var emailEl = document.getElementById("rm-email");
      var roleEl = document.getElementById("rm-role");
      var createdEl = document.getElementById("rm-created");
      var adminLink = document.getElementById("rm-admin-link");

      var loadSession = function() {
        var raw = null;
        try {
          raw = localStorage.getItem("rm_session_v1") || sessionStorage.getItem("rm_session_v1");
        } catch (_) {}
        if (!raw) return null;
        try {
          var s = JSON.parse(raw);
          if (!s || typeof s !== "object") return null;
          if (!s.email || typeof s.email !== "string") return null;
          return s;
        } catch (_) {
          return null;
        }
      };

      var loadUser = function(email) {
        try {
          var raw = localStorage.getItem("rm_users_v1");
          var users = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(users)) return null;
          for (var i = 0; i < users.length; i++) {
            if ((users[i].email || "").toLowerCase() === (email || "").toLowerCase()) return users[i];
          }
          return null;
        } catch (_) {
          return null;
        }
      };

      var logout = function() {
        try { localStorage.removeItem("rm_session_v1"); } catch (_) {}
        try { sessionStorage.removeItem("rm_session_v1"); } catch (_) {}
        window.location.href = "/";
      };

      if (logoutBtn) logoutBtn.addEventListener("click", logout);

      var session = loadSession();
      if (!session) {
        if (authRequired) authRequired.style.display = "";
        if (accountCard) accountCard.style.display = "none";
        if (loginLink) loginLink.href = "/login?destination=" + encodeURIComponent("/account");
        return;
      }

      var user = loadUser(session.email);
      var displayName = (session.name || (user ? ((user.firstName || "") + " " + (user.lastName || "")).trim() : "")).trim();
      var isAdmin = !!session.isAdmin || !!(user && user.isAdmin);

      if (authRequired) authRequired.style.display = "none";
      if (accountCard) accountCard.style.display = "";
      if (nameEl) nameEl.textContent = displayName || "—";
      if (emailEl) emailEl.textContent = session.email;
      if (roleEl) roleEl.textContent = isAdmin ? "Admin" : "Customer";
      if (createdEl) createdEl.textContent = session.createdAt ? new Date(session.createdAt).toLocaleString() : "—";
      if (adminLink) adminLink.style.display = isAdmin ? "" : "none";
    })();
  </script>
</body>
</html>
